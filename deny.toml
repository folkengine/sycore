    # Configuration for cargo-deny
# https://embarkstudios.github.io/cargo-deny/

# Note: running just `cargo deny check` is equivalent to `cargo deny check advisories bans licenses sources`

# Resolve the full feature set so local `cargo deny check` evaluates the same
# dependency graph as CI, which runs `cargo deny check --all-features`. Without
# this, the optional `seed` feature's derive chain (serde_derive -> syn ->
# unicode-ident) is absent locally but present in CI, hiding license mismatches.
[graph]
all-features = true

[advisories]
# The path where the advisory database is cloned/fetched into
db-path = "~/.cargo/advisory-db"
# The url(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db"]
# The lint level for crates that have been yanked from their source registry
yanked = "deny"
# A list of advisory IDs to ignore. Note that ignored advisories will still
# output a note when they are encountered.
ignore = [
    # `paste` is unmaintained (not a vulnerability). It is pulled in only
    # transitively through the `dcbor` / `bc-tags` stack, which is itself a
    # dev-only dependency of the `credential_envelope` example (the Gordian
    # Envelope layer never enters the library's dependency graph). There is no
    # alternative within that stack, so this is accepted at the dev boundary.
    "RUSTSEC-2024-0436",
]

[licenses]
# List of explicitly allowed licenses
# See https://spdx.org/licenses/ for list of possible licenses
#
# This project is dual-licensed "MIT OR Apache-2.0" (permissive). We allow the
# permissive licenses commonly found in the Rust dependency tree; all are
# compatible with redistribution under either of our two licenses.
#
# NOTE: To avoid "license-not-encountered" warnings, only licenses actually
# present in the all-features dependency tree are active below. Uncomment
# additional licenses as you add dependencies that introduce them.

allow = [
    # Active: licenses present in the all-features dependency tree.
    "MIT",
    "Apache-2.0",
    # Required by `unicode-ident` (pulled in via serde_derive -> proc-macro2/syn
    # under the `seed` feature). Its SPDX is "(MIT OR Apache-2.0) AND Unicode-3.0",
    # so the Unicode-3.0 AND-clause must be explicitly allowed.
    "Unicode-3.0",

    # Permissive licenses to enable as dependencies introduce them:
    # "Apache-2.0 WITH LLVM-exception",
    # "BSD-2-Clause",
    # "BSD-3-Clause",
    # "ISC",
    # "0BSD",
    # "CC0-1.0",
    # "Unlicense",
    # "Zlib",
    # "Unicode-DFS-2016",

    # Uncomment to add GPL-family / weak-copyleft licenses if ever needed:
    # "MPL-2.0",
    # "LGPL-2.1-or-later",
    # "LGPL-3.0-or-later",
]

# The confidence threshold for detecting a license from license text.
confidence-threshold = 0.8

# Allow 1 or more licenses on a per-crate basis
exceptions = []

# Ignore workspace members for license checks (they're your own code)
private = { ignore = true }

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when a crate version requirement is `*`
wildcards = "warn"
# The graph highlighting used when creating dotgraphs for crates
# with multiple versions
highlight = "all"
# List of crates that are allowed. Use with care!
allow = []
# List of crates to deny
deny = []
# Certain crates/versions that will be skipped when doing duplicate detection.
skip = []
# Similarly named crates that are allowed. Similar to `skip` but can use
# glob patterns.
skip-tree = []

[sources]
# Lint level for what to happen when a crate from a crate registry that is not
# in the allow list is encountered
unknown-registry = "warn"
# Lint level for what to happen when a crate from a git repository that is not
# in the allow list is encountered
unknown-git = "warn"
# List of URLs for allowed crate registries. Defaults to the crates.io index
# if not specified. If it is specified but empty, no registries from URLs
# will be allowed.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# List of URLs for allowed Git repositories
allow-git = []

